name: Beacon
options:
  bundleIdPrefix: com.shimondeitel.beacon
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Beacon:
    type: application
    platform: iOS
    sources:
      - path: Beacon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.beacon
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Beacon/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BeaconTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BeaconTests
      - path: Beacon.storekit
    dependencies:
      - target: Beacon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.beacon.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BeaconUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BeaconUITests
    dependencies:
      - target: Beacon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.beacon.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Beacon:
    build:
      targets:
        Beacon: all
        BeaconTests: [test]
        BeaconUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Beacon.storekit
    test:
      config: Debug
      storeKitConfiguration: Beacon.storekit
      targets:
        - BeaconTests
        - BeaconUITests
    archive:
      config: Release
